name: '[gh] issue crash report (Realistic PoC)'

on:
  issues:
    types: [opened]

jobs:
  triage:
    if: github.repository == 'izefoea/Hippy' &&contains(github.event.issue.title, 'crash')
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.triage-result.outputs.platform }}
      version: ${{ steps.triage-result.outputs.version }}
      architecture: ${{ steps.triage-result.outputs.architecture }}
      logs: ${{ steps.triage-result.outputs.logs }}
    steps:
    - run: npm install markdown-it
    - name: Triage (Original Markdown Parsing)
      id: triage-result
      uses: actions/github-script@v6.3.3
      env:
        issue_body: ${{ github.event.issue.body }}
      with:
        script: |
          const MarkdownIt = require('markdown-it');
          const os = require('os');
          const fs = require('fs');

          function parse(markdown) {
            const tokens = (new MarkdownIt()).parse(markdown, {});
            const result = {};
            let inHeading = true, key = [], value = [];
            
            tokens.forEach((token, index) => {
              if (token.type === 'heading_open' && token.markup === '###') {
                if (key.length > 0) { result[key.join(os.EOL)] = value.join(os.EOL); }
                key = []; value = []; inHeading = true;
              } else if (token.type === 'heading_close' && token.markup === '###') {
                inHeading = false;
              } else {
                const { content } = token;
                if (content) { inHeading ? key.push(content) : value.push(content); }
              }
              if (index === tokens.length - 1) { result[key.join(os.EOL)] = value.join(os.EOL); }
            });
            return result;
          }

          const info = parse(process.env.issue_body);
          ['Version', 'Platform', 'Architecture', 'Logs'].forEach(key => {
            let value = info[key];
            if (value) {
              if (['Version', 'Platform', 'Architecture'].includes(key)) {
                value = value.replaceAll(/[^0-9a-z\-_\.]/ig, '');
              }
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key.toLowerCase()}<<EOF${os.EOL}`, { encoding: 'utf8' });
              fs.appendFileSync(process.env.GITHUB_OUTPUT, value + os.EOL, { encoding: 'utf8' });
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `EOF${os.EOL}`, { encoding: 'utf8' });
            }
          });

  android-translates-addresses:
    needs: triage
    if: needs.triage.outputs.platform == 'Android' && needs.triage.outputs.logs
    runs-on: ubuntu-latest
    steps:
    - name: Backtrace (Original Regex Parsing)
      id: backtrace_parsed
      uses: actions/github-script@v6.3.3
      env:
        triage_logs: ${{ needs.triage.outputs.logs }}
      with:
        script: |
          const { appendFileSync } = require('fs');
          const { EOL } = require('os');

          function parse(log) {
            const stack = [];
            // Original regex intact
            for (const [_, pc, file, func] of log.matchAll(/#[0-9a-f]+\s+pc\s+(?:0x)?([0-9a-f]{${{ contains(needs.triage.outputs.architecture, '64') && 16 || 8}}})\s+([^\s]+)(?:\s+\(([^\+]+\+[0-9]+)\))*/ig)) {
              stack.push({pc, func, file});
            }
            return stack;
          }

          const backtrace = parse(process.env.triage_logs);
          if (backtrace.length > 0) {
            appendFileSync(process.env.GITHUB_OUTPUT, `backtrace=${JSON.stringify(backtrace)}${EOL}`, { encoding: 'utf8' });
          }

    - name: Translates (The Vulnerable Sink)
      uses: actions/github-script@v6.3.3
      with:
        script: |
          // [!] VULNERABILITY HERE: Single quotes around the expression
          console.log("Triggering JSON.parse vulnerability...");
          const backtrace = JSON.parse('${{ steps.backtrace_parsed.outputs.backtrace }}');
          
          console.log("If this line is reached without execution, the exploit failed.");
          console.log(backtrace);
